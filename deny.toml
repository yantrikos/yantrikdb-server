# cargo-deny configuration — supply chain hygiene for YantrikDB
# https://embarkstudios.github.io/cargo-deny/
#
# Run locally:  cargo deny check
# CI: runs on every push via .github/workflows/ci.yml

# cargo-deny v0.19+ format
[graph]
all-features = false
no-default-features = false

[advisories]
# Deny any crate with a known security vulnerability
ignore = []

[licenses]
# Allow common permissive licenses. Our own code is AGPL-3.0.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "BSL-1.0",
    "CC0-1.0",
    "OpenSSL",
    "MPL-2.0",             # webpki, ring (Mozilla crates)
    "CDLA-Permissive-2.0", # ONNX model files via fastembed
    "AGPL-3.0-only",       # our own license
]
# Suppress warnings for licenses that exist in the allow list but
# aren't encountered in the current dependency graph.
unused-allowed-license = "allow"
confidence-threshold = 0.8

# ring uses a custom ISC-style license
[[licenses.clarify]]
name = "ring"
expression = "ISC AND MIT AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[bans]
multiple-versions = "warn"
wildcards = "allow"
deny = []

[sources]
unknown-registry = "deny"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
