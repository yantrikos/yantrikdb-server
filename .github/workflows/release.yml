name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            ext: ""
            os_label: linux-amd64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: ".exe"
            os_label: windows-amd64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-release-${{ hashFiles('**/Cargo.toml') }}

      - name: Build server release binary
        run: cargo build -p yantrikdb-server --release

      - name: Build yql release binary
        run: cargo build -p yql --release

      - name: Stage binaries
        shell: bash
        run: |
          mkdir -p staging
          cp target/release/yantrikdb${{ matrix.ext }} staging/yantrikdb-${{ matrix.os_label }}${{ matrix.ext }}
          cp target/release/yql${{ matrix.ext }} staging/yql-${{ matrix.os_label }}${{ matrix.ext }}

      - name: Upload yantrikdb artifact
        uses: actions/upload-artifact@v4
        with:
          name: yantrikdb-${{ matrix.os_label }}${{ matrix.ext }}
          path: staging/yantrikdb-${{ matrix.os_label }}${{ matrix.ext }}

      - name: Upload yql artifact
        uses: actions/upload-artifact@v4
        with:
          name: yql-${{ matrix.os_label }}${{ matrix.ext }}
          path: staging/yql-${{ matrix.os_label }}${{ matrix.ext }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/yantrikdb-linux-amd64/yantrikdb-linux-amd64
            artifacts/yantrikdb-windows-amd64.exe/yantrikdb-windows-amd64.exe
            artifacts/yql-linux-amd64/yql-linux-amd64
            artifacts/yql-windows-amd64.exe/yql-windows-amd64.exe
