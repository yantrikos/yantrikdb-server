name: CI

on:
  push:
    branches: [main, server]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build protocol crate
        run: cargo build -p yantrikdb-protocol

      - name: Build server crate
        run: cargo build -p yantrikdb-server

      - name: Build yql crate
        run: cargo build -p yql

      - name: Test protocol crate
        run: cargo test -p yantrikdb-protocol

      - name: Test server (unit tests)
        run: cargo test -p yantrikdb-server --lib

      - name: Test server (integration tests)
        run: cargo test -p yantrikdb-server --test http_integration

      - name: CLI smoke test
        run: cargo run -p yantrikdb-server -- --help

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Clippy (protocol)
        run: cargo clippy -p yantrikdb-protocol --no-deps -- -D warnings
      - name: Clippy (server)
        run: cargo clippy -p yantrikdb-server --no-deps -- -D warnings
        continue-on-error: true

  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --check -p yantrikdb-protocol -p yantrikdb-server
